name: filesharepro
description: "Hybrid Secure File Sharing + WhatsApp Status Saver"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # File Operations
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  share_plus: ^10.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Contacts
  flutter_contacts: ^1.1.9+2

  # Media & Picker
  image_picker: ^1.1.2
  record: ^6.2.1
  audioplayers: ^5.2.1
  url_launcher: ^6.2.6
  flutter_linkify: ^6.0.0

  # QR Code (Serverless Signaling)
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # UI & Animations
  lottie: ^3.1.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Storage (No DB!)
  shared_preferences: ^2.3.2

  # Media
  video_player: ^2.9.1

  # Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  crypto: ^3.0.5

  # Utilities
  uuid: ^4.5.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.5
  mime: ^2.0.0
  http: ^1.2.0

  # WebRTC (P2P Long-Distance Transfer)
  flutter_webrtc: ^0.12.4
  nearby_connections: ^4.3.0
  local_auth: ^3.0.1
  google_mobile_ads: ^8.0.0
  webview_flutter: ^4.13.1
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  background_downloader: ^9.5.5
  gal: ^2.3.2
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 24
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#0F172A"
    theme_color: "#00F2FE"

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
